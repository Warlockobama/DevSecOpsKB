# Forgejo API token for the publisher. The DevSecOpsKB binary reads it from the
# FORGEJO_TOKEN env var (flag fallback). Mint a token after Forgejo is up:
#
#   kubectl -n devsecops-kb exec deploy/forgejo -- \
#     forgejo admin user generate-access-token --username devsecops \
#       --scopes write:issue,write:repository --raw
#
# then set it here (stringData keeps it human-readable; switch to a sealed/
# external secret in production).
apiVersion: v1
kind: Secret
metadata:
  name: forgejo-credentials
  namespace: devsecops-kb
  labels:
    app.kubernetes.io/part-of: devsecops-kb
type: Opaque
stringData:
  FORGEJO_TOKEN: "REPLACE_WITH_FORGEJO_API_TOKEN"
