# Forgejo (open-source Git forge) — the sink target. Provides BOTH halves of the
# Atlassian analog: an issue tracker (Jira analog) and a markdown wiki
# (Confluence analog). Single container, SQLite-backed, ideal for a demo/firing
# range. Pin to a digest for production.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo
  namespace: devsecops-kb
  labels:
    app.kubernetes.io/part-of: devsecops-kb
    app.kubernetes.io/name: forgejo
spec:
  replicas: 1
  strategy:
    type: Recreate # single RWO volume — never run two writers
  selector:
    matchLabels:
      app.kubernetes.io/name: forgejo
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: devsecops-kb
        app.kubernetes.io/name: forgejo
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: forgejo
          image: codeberg.org/forgejo/forgejo:9
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
            - name: ssh
              containerPort: 22
          env:
            - name: USER_UID
              value: "1000"
            - name: USER_GID
              value: "1000"
            # Minimal headless config so the instance comes up demo-ready
            # (SQLite, install page locked). Create an admin user post-start —
            # see deploy/k8s/README.md.
            - name: FORGEJO__database__DB_TYPE
              value: sqlite3
            - name: FORGEJO__server__ROOT_URL
              value: http://forgejo.devsecops-kb.svc:3000/
            - name: FORGEJO__security__INSTALL_LOCK
              value: "true"
            - name: FORGEJO__service__DISABLE_REGISTRATION
              value: "true"
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /api/healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: forgejo-data
