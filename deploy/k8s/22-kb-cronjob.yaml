# DevSecOpsKB publisher. Periodically reads the normalized entities model from
# the shared ingest volume and publishes it to Forgejo: findings -> issues, and
# the generated vault -> repo wiki (-forgejo-wiki). Source-agnostic: whatever
# detection feed produced /ingest/entities.json, this job is unchanged.
#
# Run on demand with:
#   kubectl -n devsecops-kb create job --from=cronjob/kb-publisher kb-publish-now
apiVersion: batch/v1
kind: CronJob
metadata:
  name: kb-publisher
  namespace: devsecops-kb
  labels:
    app.kubernetes.io/part-of: devsecops-kb
    app.kubernetes.io/component: publisher
spec:
  schedule: "0 * * * *" # hourly; adjust to taste
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app.kubernetes.io/part-of: devsecops-kb
            app.kubernetes.io/component: publisher
            devsecopskb.io/source: multi # yara|snort|zap|link-intel|multi
        spec:
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            fsGroup: 1000
          containers:
            - name: publisher
              image: ghcr.io/warlockobama/devsecopskb:latest # build from deploy/k8s/Dockerfile
              imagePullPolicy: IfNotPresent
              envFrom:
                - configMapRef:
                    name: kb-publisher-config
                - secretRef:
                    name: forgejo-credentials
              command: ["zap-kb"]
              args:
                - "-entities-in=$(ENTITIES_IN)"
                - "-format=obsidian"
                - "-obsidian-dir=/work/vault"
                - "-forgejo-url=$(FORGEJO_URL)"
                - "-forgejo-owner=$(FORGEJO_OWNER)"
                - "-forgejo-repo=$(FORGEJO_REPO)"
                - "-forgejo-min-risk=$(FORGEJO_MIN_RISK)"
                - "-forgejo-wiki"
                - "-forgejo-sync-kb-status"
              volumeMounts:
                - name: ingest
                  mountPath: /ingest
                - name: work
                  mountPath: /work
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  cpu: "1"
                  memory: 512Mi
          volumes:
            - name: ingest
              persistentVolumeClaim:
                claimName: kb-ingest
            - name: work
              emptyDir: {}
